<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
    <img src="images/whitelogo.png" class="logo">
    <div class="title">White Engineering Knowledge Assistant</div>
</div>

<div class="layout">

    <!-- LEFT: DOCUMENT PANEL -->
    <div class="panel documents">

        <h3>Documents</h3>

        <input type="file" id="fileUpload">

        <button onclick="upload()">Upload</button>

        <div id="doclist">
            Manuals will appear here
        </div>

    </div>

    <!-- CENTER: CHAT -->
    <div class="panel chat">

        <div id="chatWindow"></div>

        <div class="chatInput">

            <input id="question"
            placeholder="Ask about torque specs, shaft sizes, service procedures...">

            <button onclick="ask()">Ask</button>

        </div>

    </div>

    <!-- RIGHT: SOURCES -->
    <div class="panel sources">

        <h3>Sources</h3>

        <div id="sources"></div>

    </div>

</div>

<script src="app.js"></script>

</body></html>
