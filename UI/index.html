<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="loginPanel" class="loginPanel">
  <h2>Sign in</h2>
  <input id="email" placeholder="Email" value="admin@whitedrive.local">
  <input id="password" type="password" placeholder="Password" value="ChangeMeNow!">
  <button onclick="login()">Login</button>
</div>

<div id="appPanel" style="display:none;">
  <div class="header">
    <img src="/static/images/whitelogo.png" class="logo">
    <div class="title">White Engineering Knowledge Assistant</div>
    <div class="headerRight">
      <span id="modeBadge"></span>
      <span id="userBadge"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="toolbar">
    <label>Collection:</label>
    <select id="collectionSelect" onchange="onCollectionChange()"></select>
  </div>

  <div class="layout">
    <div class="panel documents">
      <h3>Documents</h3>
      <input type="file" id="fileUpload" multiple accept=".pdf" webkitdirectory directory>
      <button onclick="upload()">Upload</button>
      <div id="uploadStatus"></div>
      <div id="doclist">Manuals will appear here</div>
    </div>

    <div class="panel chat">
      <div id="chatWindow"></div>
      <div class="chatInput">
        <input id="question" placeholder="Ask about torque specs, shaft sizes, service procedures...">
        <button onclick="ask()">Ask</button>
      </div>
    </div>

    <div class="panel sources">
      <h3>Sources</h3>
      <div id="sources"></div>
    </div>
  </div>
</div>

<script src="/static/js/marked.min.js"></script>
<script src="/static/app.js"></script>
<script>
document.getElementById("question")?.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    ask();
  }
});
</script>
</body>
</html>
