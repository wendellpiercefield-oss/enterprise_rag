<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Knowledge Assistant</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Company Knowledge Assistant</h1>

<div class="search-box">
<input id="question" placeholder="Ask a question about manuals, motors, procedures...">
<button onclick="ask()">Ask</button>
</div>

<div class="answer-panel">
<h2>Answer</h2>
<div id="answer"></div>
</div>

<div class="sources-panel">
<h2>Sources</h2>
<div id="sources"></div>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
